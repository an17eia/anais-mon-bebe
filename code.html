<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code 🔐</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Playfair Display', serif;
      background: url('photo2.jpg') center/cover no-repeat fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      gap: 20px;
      overflow-x: hidden;
    }

    .card {
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
      padding: 26px 28px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      animation: fadeIn 0.8s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-title {
      font-size: 1.1rem;
      color: #c2607a;
      font-weight: 400;
      margin-bottom: 6px;
    }

    .card-subtitle {
      font-size: 0.82rem;
      color: #999;
      font-style: italic;
      margin-bottom: 20px;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .countdown-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .countdown-num {
      font-size: 2.2rem;
      font-weight: 700;
      color: #e8496e;
      line-height: 1;
    }

    .countdown-label {
      font-size: 0.65rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }

    .countdown-sep {
      font-size: 2rem;
      color: #e8496e;
      font-weight: 700;
      line-height: 1.1;
    }

    .next-date {
      font-size: 0.8rem;
      color: #c2607a;
      font-style: italic;
      margin-top: 8px;
    }

    .streak-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .streak-icon { font-size: 2rem; }

    .streak-num {
      font-size: 2.5rem;
      font-weight: 700;
      color: #e8496e;
      line-height: 1;
    }

    .streak-label {
      font-size: 0.8rem;
      color: #999;
      font-style: italic;
    }

    .best-streak {
      font-size: 0.78rem;
      color: #c2607a;
      font-style: italic;
      margin-top: 4px;
    }

    .role-label {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 14px;
      font-style: italic;
    }

    .code-display {
      font-size: 3.5rem;
      font-weight: 700;
      color: #e8496e;
      letter-spacing: 0.2em;
      margin-bottom: 6px;
      font-family: monospace;
    }

    .code-hint {
      font-size: 0.78rem;
      color: #999;
      font-style: italic;
      margin-bottom: 20px;
    }

    .code-input {
      width: 100%;
      padding: 12px;
      border: 2px solid #f0c0cc;
      border-radius: 12px;
      font-size: 1.8rem;
      font-family: monospace;
      color: #444;
      outline: none;
      text-align: center;
      letter-spacing: 0.2em;
      transition: border-color 0.2s;
      margin-bottom: 12px;
      background: rgba(255,255,255,0.8);
    }

    .code-input:focus { border-color: #e8496e; }

    .submit-btn {
      background: #ff6b9a;
      color: white;
      border: none;
      padding: 13px 28px;
      border-radius: 12px;
      font-size: 1rem;
      font-family: 'Playfair Display', serif;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255,107,154,0.4);
      width: 100%;
      transition: transform 0.2s;
    }

    .submit-btn:hover { transform: scale(1.04); }

    .code-msg {
      font-size: 0.85rem;
      margin-top: 10px;
      min-height: 20px;
      font-style: italic;
    }

    .code-msg.success { color: #4caf82; }
    .code-msg.error   { color: #e8496e; }

    .validated {
      font-size: 1rem;
      color: #4caf82;
      font-style: italic;
      margin-top: 10px;
    }

    .divider {
      border: none;
      border-top: 1px solid #f0c0cc;
      margin: 16px 0;
    }
  </style>
</head>
<body>

  <!-- COMPTE À REBOURS -->
  <div class="card">
    <p class="card-title">Notre prochain rendez-vous 🗓️</p>
    <p class="card-subtitle">Le 24 octobre 2026</p>
    <div class="countdown" id="countdown"></div>

  </div>

  <!-- STREAK -->
  <div class="card">
    <p class="card-title">Notre streak 🔥</p>
    <div class="streak-row">
      <span class="streak-icon">🔥</span>
      <span class="streak-num" id="streakNum">0</span>
    </div>
    <p class="streak-label">jours d'affilée</p>
    <p class="best-streak" id="bestStreak">Meilleur score : 0 jour</p>
  </div>

  <!-- CODE DU JOUR -->
  <div class="card">
    <p class="card-title" id="roleTitle">Code du jour 🔐</p>

    <!-- Affichage du code -->
    <div id="codeGiver">
      <p class="role-label" id="giverLabel"></p>
      <div class="code-display" id="codeDisplay"></div>
      <p class="code-hint">Envoie ce code ce soir 💌</p>
      <hr class="divider">
    </div>

    <!-- Saisie du code -->
    <div id="codeReceiver">
      <p class="role-label" id="receiverLabel"></p>
      <input class="code-input" id="codeInput" type="number" placeholder="····" />
      <button class="submit-btn" onclick="checkCode()">Valider ✓</button>
      <p class="code-msg" id="codeMsg"></p>
    </div>

    <p class="validated" id="validatedMsg" style="display:none;">✅ Validé aujourd'hui ! À demain mon amour 🥰</p>
  </div>

  <script>
    function getStorage(key) {
      try { return JSON.parse(localStorage.getItem(key)); } catch(e) { return null; }
    }
    function setStorage(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
    }

    function todayStr() {
      const d = new Date();
      return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
    }

    function yesterdayStr() {
      const d = new Date();
      d.setDate(d.getDate() - 1);
      return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
    }

    // COMPTE À REBOURS
    function updateCountdown() {
      const target = new Date('2026-10-24T00:00:00');
      const now = new Date();
      const diff = target - now;

      if (diff <= 0) {
        document.getElementById('countdown').innerHTML = '<span style="color:#e8496e;font-size:1.2rem">C\'est aujourd\'hui ! 🥰</span>';
        return;
      }

      const days    = Math.floor(diff / (1000*60*60*24));
      const hours   = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
      const minutes = Math.floor((diff % (1000*60*60)) / (1000*60));
      const seconds = Math.floor((diff % (1000*60)) / 1000);

      document.getElementById('countdown').innerHTML =
        '<div class="countdown-block"><div class="countdown-num">' + days + '</div><div class="countdown-label">jours</div></div>' +
        '<div class="countdown-sep">:</div>' +
        '<div class="countdown-block"><div class="countdown-num">' + String(hours).padStart(2,'0') + '</div><div class="countdown-label">heures</div></div>' +
        '<div class="countdown-sep">:</div>' +
        '<div class="countdown-block"><div class="countdown-num">' + String(minutes).padStart(2,'0') + '</div><div class="countdown-label">min</div></div>' +
        '<div class="countdown-sep">:</div>' +
        '<div class="countdown-block"><div class="countdown-num">' + String(seconds).padStart(2,'0') + '</div><div class="countdown-label">sec</div></div>';
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();

    // STREAK
    function loadStreak() {
      const streak = getStorage('streak') || 0;
      const best   = getStorage('bestStreak') || 0;
      document.getElementById('streakNum').textContent = streak;
      document.getElementById('bestStreak').textContent = 'Meilleur score : ' + best + ' jour' + (best > 1 ? 's' : '');
    }

    function incrementStreak() {
      const lastValidated = getStorage('lastValidated');
      let streak = getStorage('streak') || 0;
      let best   = getStorage('bestStreak') || 0;
      if (lastValidated === yesterdayStr()) {
        streak++;
      } else if (lastValidated !== todayStr()) {
        streak = 1;
      }
      if (streak > best) best = streak;
      setStorage('streak', streak);
      setStorage('bestStreak', best);
      setStorage('lastValidated', todayStr());
      loadStreak();
    }

    loadStreak();

    // CODE DU JOUR
    function getDailyCode() {
      const d = new Date();
      const seed = d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
      return String(((seed * 9301 + 49297) % 233280) % 9000 + 1000);
    }

    const dayOfMonth = new Date().getDate();
    const isErwannGiving = dayOfMonth % 2 !== 0; // impair = Erwann donne le code
    const alreadyValidated = getStorage('lastValidated') === todayStr();

    if (alreadyValidated) {
      document.getElementById('codeGiver').style.display = 'none';
      document.getElementById('codeReceiver').style.display = 'none';
      document.getElementById('validatedMsg').style.display = 'block';
    } else {
      document.getElementById('codeDisplay').textContent = getDailyCode();
      if (isErwannGiving) {
        document.getElementById('giverLabel').textContent = 'Ton code à donner à Anaïs :';
        document.getElementById('receiverLabel').textContent = 'Anaïs, entre le code qu\'Erwann t\'a envoyé :';
      } else {
        document.getElementById('giverLabel').textContent = 'Ton code à donner à Erwann :';
        document.getElementById('receiverLabel').textContent = 'Erwann, entre le code qu\'Anaïs t\'a envoyé :';
      }
    }

    function checkCode() {
      const val = document.getElementById('codeInput').value.trim();
      const msg = document.getElementById('codeMsg');
      if (val === getDailyCode()) {
        msg.textContent = 'Bonne nuit mon amour 🥰';
        msg.className = 'code-msg success';
        incrementStreak();
        setTimeout(function() {
          document.getElementById('codeGiver').style.display = 'none';
          document.getElementById('codeReceiver').style.display = 'none';
          document.getElementById('codeMsg').style.display = 'none';
          document.getElementById('validatedMsg').style.display = 'block';
        }, 1200);
      } else {
        msg.textContent = 'Ce n\'est pas le bon code.. 🥺';
        msg.className = 'code-msg error';
      }
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkCode();
    });
  </script>
</body>
</html>
