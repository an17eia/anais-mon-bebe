<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>💖</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Playfair Display', serif;

      background: url('photo2.jpg') center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;

      overflow: hidden;
    }

    /* COEUR BOUTON */
    .heart-btn {
      font-size: 6rem;
      cursor: pointer;
      transition: transform 0.3s;
      user-select: none;
    }

    .heart-btn:hover {
      transform: scale(1.1);
    }

    /* POPUP */
    .card {
      position: absolute;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(6px);
      padding: 30px 20px;
      border-radius: 20px;
      text-align: center;
      display: none;
      max-width: 90%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .card h1 {
      font-size: 1.6rem;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      background: #ff6b9a;
      color: white;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <!-- COEUR CLIQUABLE -->
  <div class="heart-btn" onclick="openCard()">❤️</div>

  <!-- CARTE -->
  <div class="card" id="card">
    <h1>Veux-tu sortir avec moi à nouveau ? 💖</h1>

    <button onclick="alert('Je suis trop heureux ❤️')">
      Bien sûr ❤️
    </button>
  </div>

  <script>
    function openCard() {
      document.getElementById("card").style.display = "block";
    }
  </script>

</body>
</html>
