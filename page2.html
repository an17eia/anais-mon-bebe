<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pour Anaïs ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background: url('photo2.jpg') center/cover no-repeat fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      padding: 30px 20px;
      overflow-x: hidden;
    }

    /* CARTE GÉNÉRIQUE */
    .card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(6px);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      padding: 25px 30px;
      text-align: center;
      width: 100%;
      max-width: 420px;
      animation: fadeIn 0.8s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* COMPTEUR */
    .counter-card h2 {
      font-size: 1.1rem;
      color: #c2607a;
      margin: 0 0 10px;
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    .counter-number {
      font-size: 5rem;
      font-weight: 700;
      color: #e8496e;
      line-height: 1;
      margin: 10px 0 5px;
    }

    .counter-label {
      font-size: 1.2rem;
      color: #555;
      margin: 0;
    }

    .heart-icon {
      font-size: 2rem;
      margin-top: 12px;
      display: block;
    }

    /* CALENDRIER */
    .calendar-card h2 {
      font-size: 1.1rem;
      color: #c2607a;
      margin: 0 0 15px;
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .calendar-header button {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: #e8496e;
      padding: 4px 10px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .calendar-header button:hover {
      background: rgba(232, 73, 110, 0.1);
    }

    .calendar-month-label {
      font-size: 1rem;
      font-weight: 600;
      color: #444;
      text-transform: capitalize;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .day-name {
      font-size: 0.7rem;
      color: #999;
      text-align: center;
      padding: 4px 0;
      font-weight: 600;
    }

    .day-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      border-radius: 50%;
      color: #444;
      cursor: default;
    }

    .day-cell.empty { background: none; }

    .day-cell.special {
      background: #e8496e;
      color: white;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(232,73,110,0.4);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.12); }
    }

    .day-cell.today {
      background: rgba(232, 73, 110, 0.15);
      color: #e8496e;
      font-weight: 600;
    }

    .special-label {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #c2607a;
    }

    /* BOUTON RETOUR */
    .nav-btn {
      background: #ff6b9a;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 1rem;
      font-family: 'Playfair Display', serif;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(255,107,154,0.4);
    }

    .nav-btn:hover, .nav-btn:active {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <!-- COMPTEUR -->
  <div class="card counter-card">
    <h2>Heureux depuis</h2>
    <div class="counter-number" id="dayCount">0</div>
    <p class="counter-label">jours</p>
    <span class="heart-icon">❤️</span>
  </div>

  <!-- CALENDRIER -->
  <div class="card calendar-card">
    <h2>Notre premier jour ✨</h2>
    <div class="calendar-header">
      <button onclick="changeMonth(-1)">‹</button>
      <span class="calendar-month-label" id="monthLabel"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
    <p class="special-label">❤️ Le 20 mars 2026, tout a commencé</p>
  </div>

  <!-- NAVIGATION -->
  <button class="nav-btn" onclick="window.location.href='index.html'">← Retour</button>

  <script>
    // --- COMPTEUR ---
    const startDate = new Date('2026-03-20T00:00:00');
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const diffMs = today - startDate;
    const diffDays = Math.max(0, Math.floor(diffMs / (1000 * 60 * 60 * 24)));

    // Animation du compteur
    let current = 0;
    const target = diffDays;
    const duration = 1200;
    const step = Math.max(1, Math.floor(target / 60));
    const interval = setInterval(() => {
      current = Math.min(current + step, target);
      document.getElementById('dayCount').textContent = current;
      if (current >= target) clearInterval(interval);
    }, duration / (target / step || 1));

    // --- CALENDRIER ---
    const SPECIAL = { year: 2026, month: 2, day: 20 }; // mois 0-indexé
    const DAY_NAMES = ['Lu', 'Ma', 'Me', 'Je', 'Ve', 'Sa', 'Di'];

    let viewYear  = SPECIAL.year;
    let viewMonth = SPECIAL.month;

    function renderCalendar() {
      const now = new Date();
      const firstDay = new Date(viewYear, viewMonth, 1);
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

      // Lundi = 0
      let startDow = firstDay.getDay() - 1;
      if (startDow < 0) startDow = 6;

      const monthNames = ['Janvier','Février','Mars','Avril','Mai','Juin',
                          'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
      document.getElementById('monthLabel').textContent =
        monthNames[viewMonth] + ' ' + viewYear;

      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';

      // Noms des jours
      DAY_NAMES.forEach(d => {
        const el = document.createElement('div');
        el.className = 'day-name';
        el.textContent = d;
        grid.appendChild(el);
      });

      // Cases vides
      for (let i = 0; i < startDow; i++) {
        const el = document.createElement('div');
        el.className = 'day-cell empty';
        grid.appendChild(el);
      }

      // Jours
      for (let d = 1; d <= daysInMonth; d++) {
        const el = document.createElement('div');
        el.className = 'day-cell';
        el.textContent = d;

        const isSpecial = d === SPECIAL.day && viewMonth === SPECIAL.month && viewYear === SPECIAL.year;
        const isToday   = d === now.getDate() && viewMonth === now.getMonth() && viewYear === now.getFullYear();

        if (isSpecial) el.classList.add('special');
        else if (isToday) el.classList.add('today');

        grid.appendChild(el);
      }
    }

    function changeMonth(dir) {
      viewMonth += dir;
      if (viewMonth > 11) { viewMonth = 0;  viewYear++; }
      if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
      renderCalendar();
    }

    renderCalendar();
  </script>
</body>
</html>
