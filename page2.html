<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>💖</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Playfair Display', serif;

      background: url('photo2.jpg') center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;

      overflow: hidden;
    }

    /* CŒUR “LIVRE” */
    .book {
      position: relative;
      width: 160px;
      height: 140px;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 1s ease;
    }

    /* forme cœur réaliste */
    .heart {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #ff3b6b;
      transform: rotate(-45deg);
      border-radius: 10px;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: #ff3b6b;
      border-radius: 50%;
    }

    .heart::before {
      top: -50%;
      left: 0;
    }

    .heart::after {
      left: 50%;
      top: 0;
    }

    /* effet ouverture */
    .book.open {
      transform: scale(0.9) rotateX(20deg);
    }

    .book.open .left {
      transform: rotateY(-120deg);
    }

    .book.open .right {
      transform: rotateY(120deg);
    }

    /* pages du livre */
    .page {
      position: absolute;
      width: 50%;
      height: 100%;
      top: 0;
      background: rgba(255,255,255,0.9);
      backface-visibility: hidden;
      transition: transform 1s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 10px;
      box-sizing: border-box;
      font-size: 1.2rem;
    }

    .left {
      left: 0;
      border-radius: 80px 0 0 80px;
      transform-origin: right;
    }

    .right {
      right: 0;
      border-radius: 0 80px 80px 0;
      transform-origin: left;
    }

    /* contenu caché au début */
    .content {
      position: absolute;
      opacity: 0;
      transition: opacity 0.5s ease 0.6s;
      width: 90%;
      text-align: center;
    }

    .book.open .content {
      opacity: 1;
    }

    button {
      margin-top: 15px;
      padding: 10px 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      background: #ff6b9a;
      color: white;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="book" onclick="openBook(this)">
    
    <div class="heart"></div>

    <div class="page left"></div>
    <div class="page right"></div>

    <div class="content">
      <div>
        <div style="font-size:1.3rem; margin-bottom:10px;">
          Veux-tu sortir avec moi à nouveau ? 💖
        </div>

        <button onclick="alert('Je suis tellement heureux ❤️')">
          Bien sûr ❤️
        </button>
      </div>
    </div>

  </div>

  <script>
    function openBook(el) {
      el.classList.toggle("open");
    }
  </script>

</body>
</html>
