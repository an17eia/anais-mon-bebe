<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>💖</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Playfair Display', serif;

      display: flex;
      justify-content: center;
      align-items: center;

      overflow: hidden;
    }

    /* fond flou propre */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url('photo2.jpg') center/cover no-repeat;
      filter: blur(7px);
      transform: scale(1.1);
      z-index: -1;
    }

    /* cœur propre */
    .heart {
      width: 130px;
      height: 130px;
      background: #ff2f6d;
      position: relative;
      transform: rotate(-45deg);
      cursor: pointer;
      transition: transform 0.3s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .heart:hover {
      transform: rotate(-45deg) scale(1.08);
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 130px;
      height: 130px;
      background: #ff2f6d;
      border-radius: 50%;
    }

    .heart::before {
      top: -65px;
      left: 0;
    }

    .heart::after {
      left: 65px;
      top: 0;
    }

    /* carte */
    .card {
      position: absolute;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      padding: 30px 25px;
      border-radius: 20px;
      text-align: center;
      max-width: 90%;
      width: 320px;

      box-shadow: 0 10px 30px rgba(0,0,0,0.25);

      opacity: 0;
      transform: scale(0.8);
      pointer-events: none;

      transition: 0.5s ease;
    }

    .card.show {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .card h1 {
      font-size: 1.4rem;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      background: #ff6b9a;
      color: white;
    }

    button:hover {
      transform: scale(1.05);
    }

    /* cacher le cœur quand carte ouverte */
    .hide {
      display: none;
    }
  </style>
</head>

<body>

  <!-- COEUR -->
  <div class="heart" id="heart" onclick="openCard()"></div>

  <!-- CARTE -->
  <div class="card" id="card">
    <h1>Veux-tu sortir avec moi à nouveau ? 💖</h1>

    <button onclick="alert('Je t’aime ❤️')">
      Bien sûr ❤️
    </button>
  </div>

  <script>
    function openCard() {
      document.getElementById("card").classList.add("show");
      document.getElementById("heart").classList.add("hide");
    }
  </script>

</body>
</html>
