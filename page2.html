<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>💖</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Playfair Display', serif;

      background: url('photo2.jpg') center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;

      perspective: 1200px;
      overflow: hidden;
    }

    /* LIVRE */
    .book {
      position: relative;
      width: 320px;
      height: 220px;
      transform-style: preserve-3d;
      cursor: pointer;
    }

    /* COUVERTURE GAUCHE */
    .cover-left, .cover-right {
      position: absolute;
      width: 50%;
      height: 100%;
      top: 0;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      backface-visibility: hidden;
      transition: transform 1s ease;
    }

    .cover-left {
      left: 0;
      border-radius: 20px 0 0 20px;
      transform-origin: left;
    }

    .cover-right {
      right: 0;
      border-radius: 0 20px 20px 0;
      transform-origin: right;
    }

    /* CONTENU */
    .content {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;

      opacity: 0;
      transition: opacity 0.5s ease 0.6s;
    }

    .content h1 {
      font-size: 1.4rem;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #ff6b9a;
      color: white;
      font-size: 1rem;
    }

    button:hover {
      transform: scale(1.05);
    }

    /* OPEN STATE */
    .book.open .cover-left {
      transform: rotateY(-120deg);
    }

    .book.open .cover-right {
      transform: rotateY(120deg);
    }

    .book.open .content {
      opacity: 1;
    }

  </style>
</head>

<body>

  <div class="book" onclick="this.classList.add('open')">

    <div class="cover-left"></div>
    <div class="cover-right"></div>

    <div class="content">
      <h1>Veux-tu sortir avec moi à nouveau ? 💖</h1>

      <button onclick="alert('Je t’aime ❤️')">
        Bien sûr ❤️
      </button>
    </div>

  </div>

</body>
</html>
