<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>💖</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Playfair Display', serif;

      background: url('photo2.jpg') center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;

      overflow: hidden;
    }

    /* COEUR */
    .heart {
      width: 120px;
      height: 120px;
      background: #ff3b6b;
      position: relative;
      transform: rotate(-45deg);
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .heart:hover {
      transform: rotate(-45deg) scale(1.1);
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 120px;
      height: 120px;
      background: #ff3b6b;
      border-radius: 50%;
    }

    .heart::before {
      top: -60px;
      left: 0;
    }

    .heart::after {
      left: 60px;
      top: 0;
    }

    /* CARTE */
    .card {
      position: absolute;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(6px);
      padding: 25px 20px;
      border-radius: 20px;
      text-align: center;
      max-width: 90%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);

      display: none;
    }

    .card h1 {
      font-size: 1.5rem;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      background: #ff6b9a;
      color: white;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <!-- COEUR -->
  <div class="heart" onclick="openCard()"></div>

  <!-- CARTE -->
  <div class="card" id="card">
    <h1>Veux-tu sortir avec moi à nouveau ? 💖</h1>

    <button onclick="alert('Je t’aime ❤️')">
      Bien sûr ❤️
    </button>
  </div>

  <script>
    function openCard() {
      document.getElementById("card").style.display = "block";
    }
  </script>

</body>
</html>
