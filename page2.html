<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>💖</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Playfair Display', serif;

      background: url('photo2.jpg') center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;

      perspective: 1200px;
      overflow: hidden;
    }

    /* LIVRE EN FORME DE COEUR */
    .book {
      position: relative;
      width: 260px;
      height: 240px;
      transform-style: preserve-3d;
      cursor: pointer;
    }

    /* COEUR DE BASE (forme globale) */
    .heart-base {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #ff2f6d;
      transform: rotate(-45deg);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .heart-base::before,
    .heart-base::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: #ff2f6d;
      border-radius: 50%;
    }

    .heart-base::before {
      top: -50%;
      left: 0;
    }

    .heart-base::after {
      left: 50%;
      top: 0;
    }

    /* PARTIE GAUCHE / DROITE QUI S'OUVRENT */
    .left, .right {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      background: rgba(255,255,255,0.92);
      transition: transform 1s ease;
      backface-visibility: hidden;
    }

    .left {
      left: 0;
      border-radius: 120px 0 0 120px;
      transform-origin: left;
    }

    .right {
      right: 0;
      border-radius: 0 120px 120px 0;
      transform-origin: right;
    }

    /* CONTENU */
    .content {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;

      opacity: 0;
      transition: opacity 0.5s ease 0.6s;
      padding: 20px;
      box-sizing: border-box;
    }

    .content h1 {
      font-size: 1.4rem;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #ff6b9a;
      color: white;
      font-size: 1rem;
    }

    button:hover {
      transform: scale(1.05);
    }

    /* OUVERTURE */
    .book.open .left {
      transform: rotateY(-120deg);
    }

    .book.open .right {
      transform: rotateY(120deg);
    }

    .book.open .content {
      opacity: 1;
    }

  </style>
</head>

<body>

  <div class="book" onclick="this.classList.add('open')">

    <!-- COEUR VISUEL -->
    <div class="heart-base"></div>

    <!-- OUVERTURE -->
    <div class="left"></div>
    <div class="right"></div>

    <!-- CONTENU -->
    <div class="content">
      <h1>Veux-tu sortir avec moi à nouveau ? 💖</h1>

      <button>
        Bien sûr ❤️
      </button>
    </div>

  </div>

</body>
</html>
