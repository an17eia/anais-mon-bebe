<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    height: 100vh;
    font-family: 'Playfair Display', serif;

    background: url('photo2.jpg') center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;

    overflow: hidden;
  }

  /* CONTENEUR */
  .heart-book {
    position: relative;
    width: 220px;
    height: 200px;
    cursor: pointer;
    transform-style: preserve-3d;
  }

  /* COEUR BASE */
  .heart {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ff2f6d;
    transform: rotate(-45deg);
  }

  .heart::before,
  .heart::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ff2f6d;
    border-radius: 50%;
  }

  .heart::before {
    top: -50%;
    left: 0;
  }

  .heart::after {
    left: 50%;
    top: 0;
  }

  /* MOITIÉS QUI S'OUVRENT */
  .left, .right {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    background: rgba(255,255,255,0.92);
    transition: transform 1s ease;
    backface-visibility: hidden;
  }

  .left {
    left: 0;
    transform-origin: left;
    border-radius: 110px 0 0 110px;
  }

  .right {
    right: 0;
    transform-origin: right;
    border-radius: 0 110px 110px 0;
  }

  /* CONTENU */
  .content {
    position: absolute;
    width: 100%;
    height: 100%;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    text-align: center;
    opacity: 0;
    transition: opacity 0.5s ease 0.6s;
    padding: 20px;
    box-sizing: border-box;
  }

  .content h1 {
    font-size: 1.3rem;
    margin-bottom: 20px;
  }

  button {
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #ff6b9a;
    color: white;
    font-size: 1rem;
  }

  button:hover {
    transform: scale(1.05);
  }

  /* OUVERTURE */
  .heart-book.open .left {
    transform: rotateY(-130deg);
  }

  .heart-book.open .right {
    transform: rotateY(130deg);
  }

  .heart-book.open .content {
    opacity: 1;
  }

</style>
</head>

<body>

<div class="heart-book" onclick="this.classList.add('open')">

  <!-- coeur visuel -->
  <div class="heart"></div>

  <!-- ouverture -->
  <div class="left"></div>
  <div class="right"></div>

  <!-- message -->
  <div class="content">
    <h1>Veux-tu sortir avec moi à nouveau ? 💖</h1>

    <button>
      Bien sûr ❤️
    </button>
  </div>

</div>

</body>
</html>
