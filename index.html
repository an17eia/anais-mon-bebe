<!DOCTYPE html>
<html lang="fr">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pour Anaïs ❤️</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;

      /* IMAGE DE FOND */
      background: url('photo2.jpg') center/cover no-repeat;

      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      overflow-x: hidden;
    }

    /* CARTE / ETIQUETTE */
    .card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(6px);
      padding: 30px 20px;
      border-radius: 20px;
      text-align: center;
      max-width: 90%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      margin-bottom: 15px;
    }

    p {
      font-size: 1.4rem;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      background: #ff6b9a;
      color: white;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Anaïs mon bébé ❤️</h1>

    <p>J'ai fait quelque chose pour te montrer à quel point je tiens à toi.</p>

    <button onclick="window.location.href='page2.html'">
      Continuer
    </button>
  </div>

</body>
</html>
