<!DOCTYPE html>
<html lang="fr">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pour Anaïs ❤️</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Playfair Display', serif;
      text-align: center;
      background: pink;
      padding-top: 100px;
      margin: 0;
      overflow-x: hidden;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 6rem);
      letter-spacing: 2px;
    }

    p {
      font-size: 1.6rem;
      margin-top: 20px;
      padding: 0 15px;
    }

    .photos {
      margin-top: 60px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    .photos img {
      width: 90%;
      max-width: 320px;
      border-radius: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .photos img:hover {
      transform: scale(1.03);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

  <h1>Anaïs mon bébé ❤️</h1>

  <p>J'ai fait quelque chose pour te montrer à quel point je tiens à toi.</p>

  <div class="photos">
    <img src="photo1.jpg" alt="photo 1">
    <img src="photo2.jpg" alt="photo 2">
  </div>

</body>
</html>
