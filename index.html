<!DOCTYPE html>
<html lang="fr">
<head> 
  <meta charset="UTF-8">
  <title>Pour Anaïs ❤️</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Playfair Display', serif;
      text-align: center;
      background: pink;
      padding-top: 100px;
      overflow-x: hidden;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 6rem);
      letter-spacing: 2px;
    }

    p {
      font-size: 2.4rem;
      margin-top: 20px;
      padding: 0 15px;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .photos {
      margin-top: 60px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
      padding-bottom: 60px;
    }

    .photos img {
      width: 90%;
      max-width: 320px;
      border-radius: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

  <h1>Anaïs mon bébé ❤️</h1>

  <p>J'ai fait quelque chose pour te montrer à quel point je tiens à toi.</p>

  <button onclick="alert('Je t’aime ❤️')">
    Clique ici
  </button>

  <div class="photos">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
  </div>

</body>
</html>
