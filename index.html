<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pour Anaïs ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Playfair Display', serif;
      background: url('photo2.jpg') center/cover no-repeat fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      padding: 30px 20px;
      overflow: hidden;
    }

    /* CŒURS */
    .heart {
      position: fixed;
      top: -40px;
      font-size: 1.4rem;
      animation: fall linear infinite;
      pointer-events: none;
      z-index: 0;
      opacity: 0.85;
    }

    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.9; }
      100% { transform: translateY(110vh) rotate(30deg); opacity: 0; }
    }

    /* CONTENU */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      text-align: center;
      padding: 0 10px;
    }

    .title {
      font-size: 2rem;
      font-weight: 700;
      color: white;
      min-height: 2.5rem;
      letter-spacing: 0.02em;
      background: rgba(0,0,0,0.35);
      padding: 10px 20px;
      border-radius: 14px;
      backdrop-filter: blur(4px);
    }

    .subtitle {
      font-size: 1.1rem;
      color: white;
      line-height: 1.7;
      max-width: 340px;
      font-style: italic;
      min-height: 4rem;
      background: rgba(0,0,0,0.35);
      padding: 14px 18px;
      border-radius: 14px;
      backdrop-filter: blur(4px);
    }

    .btn {
      background: #ff6b9a;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 14px;
      font-size: 1.05rem;
      font-family: 'Playfair Display', serif;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255,107,154,0.5);
      transition: transform 0.2s, box-shadow 0.2s;
      opacity: 0;
      animation: pulse 2.5s ease-in-out infinite;
    }

    .btn.visible {
      opacity: 1;
    }

    .btn:hover {
      transform: scale(1.06);
      box-shadow: 0 8px 28px rgba(255,107,154,0.6);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.04); }
    }
  </style>
</head>
<body>

  <div class="content">
    <div class="title" id="title"></div>
    <div class="subtitle" id="subtitle"></div>
    <button class="btn" id="btn" onclick="window.location.href='page2.html'">
      Si tu m'aimes appuie ici
    </button>
    <button class="btn" id="btnCode" onclick="window.location.href='soir.html'" style="background:#c13584; margin-top: -10px; opacity:0; pointer-events:none;">
      Code 🔐
    </button>
  </div>

  <script>
    // --- CŒURS QUI TOMBENT ---
    const HEARTS = ['❤️', '🩷', '💕', '💗', '💓', '💖', '💝'];
    function createHeart() {
      const el = document.createElement('div');
      el.className = 'heart';
      el.textContent = HEARTS[Math.floor(Math.random() * HEARTS.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.fontSize = (Math.random() * 1.2 + 0.8) + 'rem';
      const duration = Math.random() * 4 + 4;
      el.style.animationDuration = duration + 's';
      el.style.animationDelay = (Math.random() * 2) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), (duration + 2) * 1000);
    }

    // Lancer beaucoup de cœurs
    for (let i = 0; i < 30; i++) {
      setTimeout(createHeart, Math.random() * 2000);
    }
    setInterval(createHeart, 300);

    // --- EFFET MACHINE À ÉCRIRE ---
    const TEXT1 = 'Anaïs mon bébé ❤️';
    const TEXT2 = "Si tu es là c'est que tu as scanné le qr code sur ta lettre, j'espère que ça te plaira mon coeur ❤️";
    const SPEED = 55;

    function typeText(el, text, callback) {
      let i = 0;
      const timer = setInterval(function() {
        el.textContent += text[i];
        i++;
        if (i >= text.length) {
          clearInterval(timer);
          if (callback) setTimeout(callback, 400);
        }
      }, SPEED);
    }

    const titleEl    = document.getElementById('title');
    const subtitleEl = document.getElementById('subtitle');
    const btn        = document.getElementById('btn');

    // D'abord le titre, puis le sous-titre, puis le bouton
    setTimeout(function() {
      typeText(titleEl, TEXT1, function() {
        typeText(subtitleEl, TEXT2, function() {
          btn.classList.add('visible');
          document.getElementById('btnCode').style.opacity = '1';
          document.getElementById('btnCode').style.pointerEvents = 'all';
        });
      });
    }, 600);
    // --- MUSIQUE ---
    const music = document.createElement('audio');
    music.src = 'musique.mp3.mp3';
    music.loop = true;
    music.volume = 0;
    document.body.appendChild(music);

    // Lancer au premier clic/tap (contournement blocage navigateur)
    function startMusic() {
      music.play().catch(function() {});
      let vol = 0;
      const fade = setInterval(function() {
        vol = Math.min(vol + 0.05, 0.7);
        music.volume = vol;
        if (vol >= 0.7) clearInterval(fade);
      }, 100);
      document.body.removeEventListener('click', startMusic);
      document.body.removeEventListener('touchstart', startMusic);
    }

    document.body.addEventListener('click', startMusic);
    document.body.addEventListener('touchstart', startMusic);
  </script>
</body>
</html>
