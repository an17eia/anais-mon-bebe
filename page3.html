<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pour Anaïs ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Playfair Display', serif;
      background: url('photo2.jpg') center/cover no-repeat fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 30px 20px;
      overflow: hidden;
    }

    /* HINT */
    .hint {
      color: white;
      font-size: 1rem;
      font-style: italic;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      animation: fadeIn 1.5s ease both;
      opacity: 0.9;
    }

    /* COEUR */
    .heart-container {
      cursor: pointer;
      animation: fadeIn 1s ease both, float 3s ease-in-out infinite;
      transition: transform 0.2s;
    }

    .heart-container:hover {
      transform: scale(1.08);
    }

    .heart-container svg {
      width: 180px;
      height: 180px;
      filter: drop-shadow(0 8px 24px rgba(232,73,110,0.5));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* OVERLAY LIVRE */
    .book-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 10;
    }

    .book-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    /* LIVRE */
    .book {
      position: relative;
      width: 320px;
      height: 400px;
      perspective: 1200px;
    }

    .book-page {
      position: absolute;
      inset: 0;
      border-radius: 4px 16px 16px 4px;
      background: #fff9f5;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      transform-origin: left center;
      transform: rotateY(-90deg);
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 30px;
      text-align: center;
      border-left: 6px solid #e8c4c4;
    }

    .book-page.opened {
      transform: rotateY(0deg);
    }

    /* Reliure */
    .book-spine {
      position: absolute;
      left: 0;
      top: 0;
      width: 6px;
      height: 100%;
      background: linear-gradient(to bottom, #e8496e, #c2607a);
      border-radius: 4px 0 0 4px;
      z-index: 2;
    }

    /* Lignes déco */
    .book-lines {
      position: absolute;
      inset: 30px 20px;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 28px,
        #f0d9d9 28px,
        #f0d9d9 29px
      );
      opacity: 0.5;
      pointer-events: none;
    }

    .book-content {
      position: relative;
      z-index: 1;
    }

    .book-decoration {
      font-size: 2.5rem;
      margin-bottom: 20px;
      animation: none;
    }

    .book-question {
      font-size: 1.4rem;
      color: #4a2030;
      line-height: 1.5;
      font-style: italic;
      margin-bottom: 35px;
    }

    .book-btn {
      background: linear-gradient(135deg, #e8496e, #ff6b9a);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-family: 'Playfair Display', serif;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(232,73,110,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .book-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 8px 25px rgba(232,73,110,0.55);
    }

    .book-small {
      margin-top: 12px;
      font-size: 0.75rem;
      color: #c2607a;
      font-style: italic;
    }
  </style>
</head>
<body>

  <p class="hint">Clique sur le cœur ✨</p>

  <!-- COEUR -->
  <div class="heart-container" onclick="openBook()">
    <svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
      <!-- Ombre -->
      <defs>
        <filter id="shadow">
          <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#e8496e" flood-opacity="0.3"/>
        </filter>
        <!-- Texture papier -->
        <pattern id="paper" patternUnits="userSpaceOnUse" width="4" height="4">
          <rect width="4" height="4" fill="#ffe0ea"/>
          <line x1="0" y1="2" x2="4" y2="2" stroke="#f5b8cb" stroke-width="0.3" opacity="0.4"/>
        </pattern>
      </defs>
      <!-- Corps du cœur façon lettre -->
      <path d="M50 82 C50 82 8 52 8 28 C8 14 18 6 28 6 C36 6 44 11 50 18 C56 11 64 6 72 6 C82 6 92 14 92 28 C92 52 50 82 50 82Z"
            fill="url(#paper)" filter="url(#shadow)"/>
      <!-- Bordure -->
      <path d="M50 82 C50 82 8 52 8 28 C8 14 18 6 28 6 C36 6 44 11 50 18 C56 11 64 6 72 6 C82 6 92 14 92 28 C92 52 50 82 50 82Z"
            fill="none" stroke="#e8496e" stroke-width="1.5" opacity="0.7"/>
      <!-- Lignes style lettre -->
      <line x1="28" y1="36" x2="72" y2="36" stroke="#e8c4c4" stroke-width="1" opacity="0.6"/>
      <line x1="24" y1="44" x2="76" y2="44" stroke="#e8c4c4" stroke-width="1" opacity="0.6"/>
      <line x1="22" y1="52" x2="78" y2="52" stroke="#e8c4c4" stroke-width="1" opacity="0.6"/>
      <line x1="24" y1="60" x2="76" y2="60" stroke="#e8c4c4" stroke-width="1" opacity="0.5"/>
      <!-- Petit sceau -->
      <circle cx="50" cy="18" r="7" fill="#e8496e" opacity="0.85"/>
      <text x="50" y="22" text-anchor="middle" font-size="8" fill="white">♡</text>
    </svg>
  </div>

  <!-- OVERLAY LIVRE -->
  <div class="book-overlay" id="overlay">
    <div class="book">
      <div class="book-spine"></div>
      <div class="book-page" id="bookPage">
        <div class="book-lines"></div>
        <div class="book-content">
          <div class="book-decoration">💌</div>
          <p class="book-question">Veux-tu sortir<br>avec moi à nouveau ?</p>
          <button class="book-btn" onclick="window.location.href='page4.html'">Bien sûr 💕</button>
          <p class="book-small">tu n'as pas vraiment le choix..</p>
        </div>
      </div>
    </div>
  </div>

  <audio id="music" src="musique.mp3.mp3" loop></audio>

  <script>
    function openBook() {
      const overlay = document.getElementById('overlay');
      const page    = document.getElementById('bookPage');
      const music   = document.getElementById('music');

      overlay.classList.add('open');
      setTimeout(() => page.classList.add('opened'), 100);

      music.volume = 0;
      music.play().catch(() => {});
      // Fondu audio
      let vol = 0;
      const fade = setInterval(() => {
        vol = Math.min(vol + 0.05, 0.7);
        music.volume = vol;
        if (vol >= 0.7) clearInterval(fade);
      }, 100);
    }

    // Fermer en cliquant hors du livre
    document.getElementById('overlay').addEventListener('click', function(e) {
      if (e.target === this) {
        this.classList.remove('open');
        document.getElementById('bookPage').classList.remove('opened');
        document.getElementById('music').pause();
        document.getElementById('music').currentTime = 0;
      }
    });
  </script>
</body>
</html>
